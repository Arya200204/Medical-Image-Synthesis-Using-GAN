{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="login-card p-4 shadow-lg rounded" style="width: 100%; max-width: 500px; ">
        <h1 class="text-center text-primary fw-bold">MedXGAN</h1>
        <p class="text-center text-dark">AI for Better Diagnoses</p>

        <form method="POST" action="/login">
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <div class="text-center mt-3">
            <a href="/register" class="text-decoration-none text-dark">Don't have an account? <span class="fw-bold text-primary">Register</span></a>
        </div>
    </div>
</div>
{% endblock %}
