{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 50vh;">
    <div class="register-card p-4 shadow-lg rounded" 
         style="width: 100%; max-width: 400px; ">
        <h1 class="text-center text-primary fw-bold">MedXGAN</h1>
        <p class="text-center text-dark">AI for Better Diagnoses</p>

        <form method="POST" action="/register">
            <div class="mb-3">
                <input type="text" name="name" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <div class="mb-3">
                <input type="tel" name="phone" class="form-control" placeholder="Phone Number" required>
            </div>
            <div class="mb-3">
                <select name="role" class="form-select" required>
                    <option value="" disabled selected>Select Role</option>
                    <option value="Doctor">Doctor</option>
                    <option value="Patient">Patient</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>

        <div class="text-center mt-3">
            <a href="/login" class="text-decoration-none text-dark">Already have an account? 
                <span class="fw-bold text-primary">Login</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
